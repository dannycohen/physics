name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - name: Bundle size gate
        run: |
          BUDGET_KB=100
          TOTAL=$(find dist/_astro -name '*.js' -exec cat {} + 2>/dev/null | gzip -c | wc -c)
          TOTAL_KB=$((TOTAL / 1024))
          echo "Client JS (gzipped, all pages combined): ${TOTAL_KB} KB (budget: ${BUDGET_KB} KB)"
          if [ "$TOTAL_KB" -gt "$BUDGET_KB" ]; then
            echo "::error::Client JS budget exceeded"
            exit 1
          fi
